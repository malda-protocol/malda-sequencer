[package]
name = "guests"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "check-liquidity"
path = "src/bin/check_liquidity.rs"

[workspace]

[dependencies]
secp256k1 = { version = "0.29.1", features = ["recovery", "std", "global-context"] }
k256 = "0.13.4"
alloy-primitives = { version = "^0.7", default-features = false, features = [
    "rlp",
    "serde",
    "std",
] }
alloy-sol-types = { version = "^0.7.7" }
log = { version = "0.4" }
risc0-steel = "0.11.1"
risc0-zkvm = { version = "1.0", default-features = false, features = ['std'] }

[profile.release]
lto = "thin"
